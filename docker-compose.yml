version: "3.8"

services:
  wyoming-stt:
    build: ./wyoming-stt-adapter
    container_name: shm-stt-adapter
    ports:
      - "10310:10310"
    environment:
      - STT_BACKEND_URL=http://host.docker.internal:10300
      - STT_LANGUAGE=zh
      - STT_MODEL=base
      - WYOMING_URI=tcp://0.0.0.0:10310
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  wyoming-tts:
    build: ./wyoming-tts-adapter
    container_name: shm-tts-adapter
    ports:
      - "10311:10311"
    environment:
      - TTS_BACKEND_URL=http://host.docker.internal:5000
      - TTS_VOICE=default
      - WYOMING_URI=tcp://0.0.0.0:10311
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  wyoming-wake-word:
    build: ./wyoming-wake-word
    container_name: shm-wake-word
    ports:
      - "10400:10400"
    volumes:
      - ./models:/models
    environment:
      - WAKE_WORD_MODEL=/models/hey_jarvis.onnx
      - WAKE_WORD_THRESHOLD=0.5
      - WAKE_WORD_COOLDOWN=2.0
      - WYOMING_URI=tcp://0.0.0.0:10400
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  llm-gateway:
    build: ./llm-gateway
    container_name: shm-llm
    ports:
      - "8080:8080"
    env_file:
      - config/.env
    restart: unless-stopped

